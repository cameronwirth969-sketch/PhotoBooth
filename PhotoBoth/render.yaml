services:
  - type: web
    name: PhotoBoth
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
    disk:
      name: photoboth-data
      mountPath: /opt/render/project/src
      sizeGB: 2
